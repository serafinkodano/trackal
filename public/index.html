<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alensa Price Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border);
        }

        .login-box h2 {
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .login-box p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 20px;
        }

        /* Dashboard layout */
        .dashboard {
            display: none;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        select {
            padding: 0.6rem 1rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            min-width: 200px;
            cursor: pointer;
        }

        .search-box {
            flex-grow: 1;
            position: relative;
        }

        .search-box input {
            padding-left: 2.5rem;
            background-color: var(--card-bg);
            height: 100%;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            position: relative;
            height: 400px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .date-filter {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .date-filter input[type="date"] {
            padding: 0.4rem 0.6rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-size: 0.85rem;
            width: auto;
        }

        .tabs-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 0.8rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            width: auto;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .products-table-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .products-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .products-list {
            overflow-y: auto;
            max-height: 500px;
        }

        .product-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .product-item:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .product-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .product-price {
            font-weight: 700;
            color: var(--accent);
        }

        .product-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
        }

        .trend-up {
            color: var(--danger);
        }

        .trend-down {
            color: var(--success);
        }

        .trend-flat {
            color: var(--text-muted);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
    <!-- Zewnętrzne biblioteki -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Ekran Logowania -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Alensa Price Tracker</h2>
            <p>Prywatny Panel Operacyjny</p>
            <div class="input-group">
                <input type="password" id="password" placeholder="Wprowadź hasło" onkeypress="handleEnter(event)">
            </div>
            <button onclick="checkPassword()">Zaloguj się</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <!-- Główny Dashboard (ukryty do czasu zalogowania) -->
    <div class="dashboard" id="dashboard">
        <header>
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                Alensa Tracker
            </h1>
            <div id="last-updated" class="stat-title">Ostatnia aktualizacja: ładowanie...</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Śledzone produkty</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Ostatnie zmiany (Spadki)</div>
                <div class="stat-value" id="stat-down" style="color: var(--success)">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Ostatnie zmiany (Wzrosty)</div>
                <div class="stat-value" id="stat-up" style="color: var(--danger)">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Wyszukaj po nazwie produktu..."
                    oninput="filterProducts()">
            </div>
            <select id="sort-select" onchange="sortProducts()">
                <option value="name_asc">Nazwa (A-Z)</option>
                <option value="name_desc">Nazwa (Z-A)</option>
                <option value="price_asc">Cena (Rosnąco)</option>
                <option value="price_desc">Cena (Malejąco)</option>
            </select>
        </div>

        <div class="main-grid">
            <div class="products-table-container">
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="switchTab('tab-all')">Wszystkie produkty</button>
                    <button class="tab-btn" onclick="switchTab('tab-changes')">Ostatnie zmiany cen <span
                            id="changes-badge"
                            style="background:var(--accent);color:white;padding:2px 6px;border-radius:10px;font-size:0.7rem;margin-left:5px">0</span></button>
                </div>

                <div id="tab-all" class="tab-content active">
                    <div class="products-list" id="products-list">
                        <div class="loading">Wczytywanie danych z repozytorium...</div>
                    </div>
                </div>

                <div id="tab-changes" class="tab-content">
                    <div class="products-list" id="changes-list">
                        <!-- Zmienione produkty -->
                    </div>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-header">
                    <h3 id="chart-title">Wybierz produkt z listy poniżej</h3>
                    <div class="date-filter">
                        <label for="date-start" style="font-size:0.85rem;color:var(--text-muted)">Od:</label>
                        <input type="date" id="date-start" onchange="updateChartWithDates()">
                        <label for="date-end" style="font-size:0.85rem;color:var(--text-muted)">Do:</label>
                        <input type="date" id="date-end" onchange="updateChartWithDates()">
                        <button onclick="resetDates()" style="padding:0.4rem;font-size:0.8rem;width:auto">Reset</button>
                    </div>
                </div>
                <div style="height: 330px; position:relative;">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // UWAGA: Proste zabezpieczenie front-endowe na potrzeby prywatnego użytku (Brak bazy danych).
        // W prawdziwym wdrożeniu należałoby to ukryć na Vercelu (Basic Auth),
        // Ale tu hasło posłuży nam przed przypadkowymi kliknięciami ze zlinkowanych url.
        const SECRET_HASH = "b4b147bc522828731f1a016bfa72c073"; // To tylko hash slowa "admin" w md5 do testow.

        let allData = {};
        let datesList = [];
        let latestDate = "";
        let productMap = new Map(); // name -> history array
        let currentProducts = [];
        let changedProducts = [];
        let currentChart = null;
        let selectedProduct = null;

        // Pola formularza
        let dateStartInput, dateEndInput;

        document.addEventListener('DOMContentLoaded', () => {
            dateStartInput = document.getElementById('date-start');
            dateEndInput = document.getElementById('date-end');
        });

        // MD5 zrobione zeby nie trzymać plain textu hasla
        function getMD5(string) {
            // Very simple pseudo-hash for demonstration
            let hash = 0;
            for (let i = 0; i < string.length; i++) {
                hash = (hash << 5) - hash + string.charCodeAt(i);
                hash |= 0;
            }
            return hash.toString();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        }

        function checkPassword() {
            const pwd = document.getElementById('password').value;
            // Bardzo proste i naiwne sprawdzenie do celow demonstracyjnych aplikacji statycznej
            if (pwd === "alensa123") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                document.getElementById('error-msg').innerText = "Nieprawidłowe hasło. Spróbuj 'alensa123'.";
            }
        }

        async function loadData() {
            try {
                // Fetch the JSON generated by Python action
                const response = await fetch('history.json' + '?v=' + new Date().getTime());
                if (!response.ok) throw new Error("Nie znaleziono pliku history.json");

                allData = await response.json();
                processData();
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('products-list').innerHTML = `
                    <div class="loading" style="color:var(--danger)">
                        Błąd podczas ładowania danych: ${error.message} <br>
                        Upewnij się, że plik history.json znajduje się w folderze public.
                    </div>
                `;
            }
        }

        function processData() {
            // Reset map
            productMap.clear();

            // Get all sorted dates
            datesList = Object.keys(allData).sort();
            if (datesList.length === 0) return;

            latestDate = datesList[datesList.length - 1];

            // Populate the product map with historical data
            datesList.forEach(date => {
                const dayProducts = allData[date];
                dayProducts.forEach(prod => {
                    if (!productMap.has(prod.nazwa)) {
                        productMap.set(prod.nazwa, {
                            name: prod.nazwa,
                            link: prod.link,
                            history: {}
                        });
                    }
                    productMap.get(prod.nazwa).history[date] = prod.cena;
                });
            });

            // Prepare array for rendering list based on latest date (or last available)
            currentProducts = Array.from(productMap.values()).map(p => {
                // Znajdź najnowszą dostepną cene i poprzednią do wyznaczenia trendu
                const validDates = datesList.filter(d => p.history[d] !== undefined);
                const lastD = validDates[validDates.length - 1];
                const prevD = validDates.length > 1 ? validDates[validDates.length - 2] : null;

                const currPrice = p.history[lastD];
                const prevPrice = prevD ? p.history[prevD] : currPrice;

                let trend = "flat";
                let diff = 0;

                if (currPrice > prevPrice) { trend = "up"; diff = currPrice - prevPrice; }
                else if (currPrice < prevPrice) { trend = "down"; diff = prevPrice - currPrice; }

                const prodObj = {
                    name: p.name,
                    link: p.link,
                    price: currPrice,
                    trend: trend,
                    diff: diff.toFixed(2),
                    history: p.history
                };

                if (trend !== "flat") {
                    changedProducts.push(prodObj);
                }

                return prodObj;
            });

            // Set default date range to full dataset
            if (datesList.length > 0) {
                dateStartInput.value = datesList[0];
                dateEndInput.value = datesList[datesList.length - 1];
                dateStartInput.max = datesList[datesList.length - 1];
                dateEndInput.max = datesList[datesList.length - 1];
            }

            updateDashboardUI();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function resetDates() {
            if (datesList.length > 0) {
                dateStartInput.value = datesList[0];
                dateEndInput.value = datesList[datesList.length - 1];
                if (selectedProduct) updateChartWithDates();
            }
        }

        function updateDashboardUI() {
            document.getElementById('last-updated').innerText = `Ostatnia aktualizacja: ${latestDate}`;
            document.getElementById('stat-total').innerText = currentProducts.length;

            const drops = currentProducts.filter(p => p.trend === 'down').length;
            const raises = currentProducts.filter(p => p.trend === 'up').length;

            document.getElementById('stat-down').innerText = drops;
            document.getElementById('stat-up').innerText = raises;
            document.getElementById('changes-badge').innerText = changedProducts.length;

            // Render different lists
            sortProducts();
            renderList(changedProducts, 'changes-list');

            // Show default chart for the first product
            if (currentProducts.length > 0) {
                renderChart(currentProducts[0]);
            }
        }

        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = currentProducts.filter(p => p.name.toLowerCase().includes(query));
            renderList(filtered);
        }

        function sortProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            let filtered = currentProducts.filter(p => p.name.toLowerCase().includes(query));
            const sortBy = document.getElementById('sort-select').value;

            filtered.sort((a, b) => {
                if (sortBy === 'name_asc') return a.name.localeCompare(b.name);
                if (sortBy === 'name_desc') return b.name.localeCompare(a.name);
                if (sortBy === 'price_asc') return a.price - b.price;
                if (sortBy === 'price_desc') return b.price - a.price;
            });

            renderList(filtered, 'products-list');
        }

        function renderList(products, targetId = 'products-list') {
            const listEl = document.getElementById(targetId);
            listEl.innerHTML = '';

            if (products.length === 0) {
                listEl.innerHTML = '<div class="loading" style="font-size:0.9rem">Brak produktów spełniających kryteria.</div>';
                return;
            }

            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'product-item';

                let trendIcon = "➖";
                let trendClass = "trend-flat";
                let diffText = "";

                // Show difference text only for changed
                if (p.trend === 'up') {
                    trendIcon = "📈";
                    trendClass = "trend-up";
                    diffText = `(+${p.diff} zł)`;
                } else if (p.trend === 'down') {
                    trendIcon = "📉";
                    trendClass = "trend-down";
                    diffText = `(-${p.diff} zł)`;
                }

                item.innerHTML = `
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-trend ${trendClass}">
                            ${trendIcon} <a href="${p.link}" target="_blank" style="color: inherit; text-decoration: none" onclick="event.stopPropagation()">🔗 Sklep</a> ${diffText}
                        </div>
                    </div>
                    <div class="product-price">${p.price.toFixed(2)} zł</div>
                `;

                item.onclick = () => renderChart(p);
                listEl.appendChild(item);
            });
        }

        function updateChartWithDates() {
            if (selectedProduct) {
                renderChart(selectedProduct);
            }
        }

        function renderChart(productInfo) {
            selectedProduct = productInfo;

            const canvas = document.getElementById('priceChart');
            const ctx = canvas.getContext('2d');

            document.getElementById('chart-title').innerText = productInfo.name;

            if (currentChart) {
                currentChart.destroy();
            }

            // Apply Date Filters
            const startDateStr = dateStartInput.value;
            const endDateStr = dateEndInput.value;

            const filteredDates = datesList.filter(d => {
                const dTime = new Date(d).getTime();
                const startT = startDateStr ? new Date(startDateStr).getTime() : 0;
                const endT = endDateStr ? new Date(endDateStr).getTime() : Infinity;
                return dTime >= startT && dTime <= endT;
            });

            // Prepare chart data
            const labels = filteredDates;
            const data = filteredDates.map(d => productInfo.history[d] || null);

            // Setup chart
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'Inter';

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Cena w PLN',
                        data: data,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderWidth: 2,
                        pointBackgroundColor: '#10b981',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#10b981',
                        fill: true,
                        tension: 0.2,
                        spanGaps: true // Draw lines across missing data
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    return context.parsed.y + ' zł';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: '#334155' }
                        },
                        x: {
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
